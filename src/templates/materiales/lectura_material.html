<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura del material</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #6798f2;
            --surface: #d9d9d9;
            --border: #000000;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        .sidebar-frame {
            width: 180px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 28px;
            position: sticky;
            top: 0;
            height: 100vh;
            align-self: flex-start;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-nav a {
            display: block;
            padding: 14px 0;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            transition: opacity 0.15s ease;
        }

        .sidebar-nav a:hover { opacity: 0.55; }
        .sidebar-nav .activo { font-weight: 600; }

        .content-frame-page {
            flex: 1;
            min-width: 0;
            padding: 24px 32px 40px;
            position: relative;
        }

        .title {
            font-size: 48px;
            font-weight: 600;
            margin: 40px 0 0 0;
            letter-spacing: -0.48px;
        }

        .avatar {
            width: 74px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d9d9d9, #bfbfbf);
            position: absolute;
            top: 24px;
            right: 10px;
        }

        .reader {
            margin-top: 40px;
            border: 1px solid var(--border);
            min-height: 780px;
            padding: 24px 24px 28px;
            display: grid;
            grid-template-columns: minmax(320px, 620px) 320px;
            gap: 28px;
            align-items: start;
        }

        .content-card {
            background: var(--surface);
            min-height: 680px;
            padding: 24px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .content-card p {
            margin: 0;
            font-size: 25px;
            line-height: 1.4;
            max-width: 420px;
        }

        .notes {
            border: 1px solid var(--border);
            background: #ffffff;
            min-height: 560px;
            padding: 24px 18px 24px 20px;
        }

        .notes h2 {
            margin: 0 0 18px;
            font-size: 25px;
            font-weight: 600;
        }

        .notes p {
            margin: 0;
            font-size: 25px;
            line-height: 1.4;
        }

        .print-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 18px 0 0 auto;
            background: var(--accent);
            color: var(--text);
            border: none;
            padding: 14px 32px;
            font-size: 25px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 980px) {
            .reader { grid-template-columns: 1fr; }
            .title { margin-left: 0; }
        }
    </style>
</head>
<body>
    <aside class="sidebar-frame">
        <nav class="sidebar-nav" aria-label="Navegacion principal">
            <a href="#">Buscar</a>
            <a href="#">Para ti</a>
            <a href="#">Siguiendo</a>
        </nav>
    </aside>

    <div class="content-frame-page">
        <h1 class="title">{{ titulo }}</h1>
        <a href="{% url 'feed:perfil_publico' request.user.username %}" style="text-decoration:none; color:inherit;">
        <div class="avatar" aria-label="Perfil"></div>
        </a>

        <section class="reader">
            <div class="content-card">
                <p>{{ contenido }}</p>
            </div>
            <div>
                <div class="notes">
                    <h2>Notas</h2>
                    <p>{{ notas }}</p>
                </div>
                <button class="print-btn" type="button">Imprimir</button>
            </div>
        </section>
    </div>
</body>
</html>
