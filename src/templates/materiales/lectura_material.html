<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura del material</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #6798f2;
            --surface: #d9d9d9;
            --border: #000000;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        .sidebar-frame {
            width: 180px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 28px;
            position: sticky;
            top: 0;
            height: 100vh;
            align-self: flex-start;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-nav a {
            display: block;
            padding: 14px 0;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            transition: opacity 0.15s ease;
        }

        .sidebar-nav a:hover { opacity: 0.55; }
        .sidebar-nav .activo { font-weight: 600; }

        /* Icono de campana */
        .notificacion-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 0;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            transition: opacity 0.15s ease;
            position: relative;
        }

        .notificacion-link:hover { opacity: 0.55; }

        .notificacion-link svg {
            width: 22px;
            height: 22px;
        }

        .badge {
            background: #ff3b3b;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            position: absolute;
            top: 10px;
            left: 14px;
        }

        .content-frame-page {
            flex: 1;
            min-width: 0;
            padding: 24px 32px 40px;
            position: relative;
        }

        .title {
            font-size: 48px;
            font-weight: 600;
            margin: 40px 0 0 0;
            letter-spacing: -0.48px;
        }

        .avatar {
            width: 74px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d9d9d9, #bfbfbf);
            position: absolute;
            top: 24px;
            right: 10px;
        }

        .reader {
            margin-top: 40px;
            border: 1px solid var(--border);
            padding: 24px 24px 28px;
            display: grid;
            grid-template-columns: minmax(320px, 480px) 300px;
            gap: 28px;
            align-items: start;
        }

        .content-card {
            background: var(--surface);
            width: 100%;
            /* La altura se controla por JS dependiendo si es portada o texto */
            padding: 0; 
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            overflow: hidden; 
            position: relative;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25); /* Sombreado solicitado */
            border: 1px solid #ddd;
        }
        
        .page-scaler {
            width: 816px;
            height: 1056px;
            transform-origin: top left;
            padding: 96px;
            background: #fff;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            line-height: 1.5;
        }
        
        .page-scaler img {
            max-width: 100%;
            height: auto;
        }

        .notes {
            border: 1px solid var(--border);
            background: #ffffff;
            min-height: 400px;
            padding: 20px 16px;
        }

        .notes h2 {
            margin: 0 0 18px;
            font-size: 25px;
            font-weight: 600;
        }

        .notes p {
            margin: 0;
            font-size: 25px;
            line-height: 1.4;
        }

        .print-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 18px 0 0 auto;
            background: var(--accent);
            color: var(--text);
            border: none;
            padding: 14px 32px;
            font-size: 25px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        
        .nav-controls button {
            margin: 0;
            padding: 10px 20px;
            font-size: 20px;
        }
        
        .nav-controls button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @media (max-width: 980px) {
            .reader { grid-template-columns: 1fr; }
            .title { margin-left: 0; }
        }
    </style>
</head>
<body>
    <aside class="sidebar-frame">
        <nav class="sidebar-nav" aria-label="Navegacion principal">
            <a href="{% url 'feed:notificaciones' %}" class="notificacion-link" aria-label="Notificaciones">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                {% if unread_notifications_count > 0 %}
                <span class="badge">{{ unread_notifications_count }}</span>
                {% endif %}
            </a>
            <a href="{% url 'busqueda:busqueda' %}">Buscar</a>
            <a href="{% url 'materiales:inicio' %}">Para ti</a>
            <a href="{% url 'feed:feed' %}">Siguiendo</a>
            <a href="{% url 'materiales:creacion_material' %}">Crear Material</a>
        </nav>
    </aside>

    <div class="content-frame-page">
        <h1 class="title">{{ libro.titulo }}</h1>
        <a href="{% url 'feed:perfil_publico' request.user.username %}" style="text-decoration:none; color:inherit;">
        <div class="avatar" aria-label="Perfil"></div>
        </a>

        <section class="reader">
            <div class="content-card" id="page-display">
                <!-- Contenido dinamico inyectado por JS -->
            </div>
            <div>
                <div class="notes">
                    <h2>Notas</h2>
                    <p>Sección de notas...</p>
                </div>
                
                <div class="nav-controls">
                    <button id="btn-prev" class="print-btn" disabled>&larr;</button>
                    <span id="page-indicator" style="font-size: 18px; font-weight: 600;">Portada</span>
                    <button id="btn-next" class="print-btn">&rarr;</button>
                </div>
                <button class="print-btn" type="button" style="width: 100%; margin-top: 20px;">Imprimir</button>
            </div>
        </section>
        
        <!-- Contenedor oculto con todo el texto crudo del editor -->
        <div id="raw-content" style="display: none;">
            {{ libro.contenido_texto|safe }}
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const rawContentDiv = document.getElementById('raw-content');
            const pageDisplay = document.getElementById('page-display');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const pageIndicator = document.getElementById('page-indicator');
            
            const pages = [];
            
            // Portada como primera pagina (height auto para que encaje su proporcion real)
            {% if libro.portada %}
            pages.push('<img style="width: 100%; height: auto; display: block;" src="{{ libro.portada.url }}" alt="Portada">');
            {% else %}
            pages.push('<div style="text-align: center; padding-top: 200px; font-size: 32px; color: #888;">Sin Portada</div>');
            {% endif %}
            
            const temp = document.createElement('div');
            temp.innerHTML = rawContentDiv.innerHTML;
            
            let currentChunk = document.createElement('div');
            
            Array.from(temp.children).forEach(child => {
                if (child.classList && child.classList.contains('page-gap')) {
                    if (currentChunk.innerHTML.trim() !== '') {
                        // Envolvemos en el escalador
                        pages.push('<div class="page-scaler">' + currentChunk.innerHTML + '</div>');
                        currentChunk = document.createElement('div');
                    }
                } else {
                    currentChunk.appendChild(child.cloneNode(true));
                }
            });
            
            if (currentChunk.innerHTML.trim() !== '') {
                pages.push('<div class="page-scaler">' + currentChunk.innerHTML + '</div>');
            }
            
            let currentPageIndex = 0;
            
            function scaleContent() {
                const cardWidth = pageDisplay.clientWidth;
                
                if (currentPageIndex === 0) {
                    // Para la portada, dejamos que la imagen defina la altura naturalmente
                    pageDisplay.style.height = 'auto';
                } else {
                    // Para las paginas de texto, forzamos la altura escalada
                    const scale = cardWidth / 816; // 816 es el ancho base de la hoja
                    const scalers = document.querySelectorAll('.page-scaler');
                    if (scalers.length > 0) {
                        scalers.forEach(s => {
                            s.style.transform = 'scale(' + scale + ')';
                        });
                        // Altura matematica exacta: 1056 * escala
                        pageDisplay.style.height = (1056 * scale) + 'px';
                    }
                }
            }
            
            function renderPage() {
                pageDisplay.innerHTML = pages[currentPageIndex];
                
                if (currentPageIndex === 0) {
                    pageIndicator.textContent = "Portada";
                } else {
                    pageIndicator.textContent = "Página " + currentPageIndex + " de " + (pages.length - 1);
                }
                
                btnPrev.disabled = currentPageIndex === 0;
                btnNext.disabled = currentPageIndex === pages.length - 1;
                
                scaleContent();
            }
            
            btnPrev.addEventListener('click', () => {
                if (currentPageIndex > 0) {
                    currentPageIndex--;
                    renderPage();
                }
            });
            
            btnNext.addEventListener('click', () => {
                if (currentPageIndex < pages.length - 1) {
                    currentPageIndex++;
                    renderPage();
                }
            });
            
            window.addEventListener('resize', scaleContent);
            
            // Inicializar
            renderPage();
        });
    </script>
</body>
</html>
