<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura del material</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #6798f2;
            --surface: #d9d9d9;
            --border: #000000;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            min-height: 100vh;
            padding: 24px 32px 40px;
            display: flex;
            justify-content: center;
        }

        .shell {
            width: min(1440px, 100%);
            position: relative;
        }

        .title {
            font-size: 48px;
            font-weight: 600;
            margin: 64px 0 0 240px;
            letter-spacing: -0.48px;
        }

        .avatar {
            width: 74px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d9d9d9, #bfbfbf);
            position: absolute;
            top: 24px;
            right: 10px;
        }

        .sidebar {
            position: absolute;
            left: 16px;
            top: 320px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            font-size: 25px;
            font-weight: 600;
        }

        .sidebar a {
            color: var(--text);
            text-decoration: none;
        }

        .reader {
            margin: 120px 0 0 220px;
            border: 1px solid var(--border);
            min-height: 780px;
            padding: 24px 24px 28px;
            display: grid;
            grid-template-columns: minmax(320px, 620px) 320px;
            gap: 28px;
            align-items: start;
        }

        .content-card {
            background: var(--surface);
            min-height: 680px;
            padding: 24px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .content-card p {
            margin: 0;
            font-size: 25px;
            line-height: 1.4;
            max-width: 420px;
        }

        .notes {
            border: 1px solid var(--border);
            background: #ffffff;
            min-height: 560px;
            padding: 24px 18px 24px 20px;
        }

        .notes h2 {
            margin: 0 0 18px;
            font-size: 25px;
            font-weight: 600;
        }

        .notes p {
            margin: 0;
            font-size: 25px;
            line-height: 1.4;
        }

        .print-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 18px 0 0 auto;
            background: var(--accent);
            color: var(--text);
            border: none;
            padding: 14px 32px;
            font-size: 25px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 980px) {
            .reader { grid-template-columns: 1fr; margin-left: 0; }
            .sidebar { position: static; flex-direction: row; margin: 40px 0 0; }
            .title { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="shell">
            <div class="title">{{ titulo }}</div>
            <div class="avatar" aria-label="Perfil"></div>

            <nav class="sidebar" aria-label="Navegación lateral">
                <a href="#">Buscar</a>
                <a href="#">Para ti</a>
                <a href="#">Siguiendo</a>
            </nav>

            <section class="reader">
                <div class="content-card">
                    <p>{{ contenido }}</p>
                </div>
                <div>
                    <div class="notes">
                        <h2>Notas</h2>
                        <p>{{ notas }}</p>
                    </div>
                {% if perfil %}
                <div style="background: #f0f4ff; border: 1px solid var(--accent); padding: 10px 16px; margin-top: 16px; font-size: 16px; display: flex; justify-content: space-between; align-items: center;">
                    <span>Cuota disponible: <strong>{{ perfil.cuota_descarga }}</strong> paginas</span>
                    <span>Este libro: <strong>{{ libro.paginas }}</strong> paginas</span>
                </div>
                {% endif %}
                <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 12px;">
                    <a href="{% url 'materiales:descargar_libro' libro.id %}" class="print-btn" style="text-decoration: none;">Descargar</a>
                    <button class="print-btn" type="button">Imprimir</button>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
